  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #2F7A2F;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
</head>
<body>
  <div id="loading" style="display:flex;justify-content:center;align-items:center;height:100vh;font-family:system-ui,sans-serif;color:#2F7A2F;">
    <div style="text-align:center">
      <div style="font-size:24px;font-weight:bold;margin-bottom:8px;">KitchenGuard</div>
      <div style="font-size:14px;color:#666;">Loading...</div>
    </div>
  </div>
  <script src="flutter_bootstrap.js" async=""></script>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) el.remove();
    });
  </script>
  <script>
    (function () {
      if (!('serviceWorker' in navigator)) return;

      var reloadedKey = 'kg_sw_reloaded_once';

      function requestActivateAndReload(registration) {
        if (!registration || !registration.waiting) return;
        if (sessionStorage.getItem(reloadedKey) === '1') return;

        sessionStorage.setItem(reloadedKey, '1');
        registration.waiting.postMessage({ type: 'SKIP_WAITING' });

        navigator.serviceWorker.addEventListener('controllerchange', function () {
          window.location.reload();
        }, { once: true });
      }

      window.addEventListener('load', function () {
        navigator.serviceWorker.getRegistration().then(function (registration) {
          if (!registration) return;

          if (registration.waiting) {
            requestActivateAndReload(registration);
            return;
          }

          registration.addEventListener('updatefound', function () {
            var installing = registration.installing;
            if (!installing) return;
            installing.addEventListener('statechange', function () {
              if (installing.state === 'installed' && registration.waiting) {
                requestActivateAndReload(registration);
              }
            });
          });

          registration.update();
        });
      });
    })();
  </script>


</body></html>
